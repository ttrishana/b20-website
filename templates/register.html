<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - CSCB20</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <input id="color-mode" type="checkbox" name="color-mode">
    <label for="color-mode">Switch Modes</label><br>

    <header>
        <nav>
            <ul class="nav__links">
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="feedback">
        <h2>Welcome to CSCB20!</h2>
        <p>Please register or login if you already have an account</p>
        
        <div class="feedback-container">
            <div class="feedback-card">
                <form class="feedback-form" action="http://127.0.0.1:5000/register.html" method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="Username" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="Email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="text" id="password" name="Password" required>
                    </div>
                    <div class="form-group">
                        <label for="accountType"></label>
                        <select id="accountType" name="AccountType" required>
                            <option value="" disabled selected>Select Account Type</option>
                            <option value="Student">Student</option>
                            <option value="Instructor">Instructor</option>
                        </select>
                    </div>
                    <button type="submit"> Register </button>
                </form>
            </div>
        </div>
    </section>
    
        <footer>
            <div class="footer-content">
                <p>Site design by Trishana and Hong Yu</p>
                <li><a href="https://web.cs.toronto.edu/">Faculty of Computer Science @ UofT</a></li>
            </div>
            
        </footer>    

</body>
</html>
